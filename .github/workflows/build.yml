name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # Opt into Node 24 for GitHub Actions until the actions themselves bump major.
  # Silences the Node 20 deprecation warning logged every run.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build (Spotless + SpotBugs + JaCoCo + JUnit)
        # -Pskip-inspector-wrapper silences the GradleRIO "wrapper/dists"
        # competition-purge warning; the distributionBase in the wrapper
        # properties is already GRADLE_USER_HOME, so the warning is misleading.
        run: ./gradlew build -Pskip-inspector-wrapper

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/test/
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: build/reports/jacoco/test/html/
          retention-days: 7

      - name: Upload SpotBugs reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-reports
          path: build/reports/spotbugs/
          retention-days: 7

      # ─── PR-size comment ─────────────────────────────────────────────────
      # Posts a rough size summary on PRs so reviewers can budget their
      # attention. Not a gate — a 2000-line PR can be trivial (generated
      # code, docs) and a 50-line PR can be terrifying. The comment just
      # surfaces the number.
      - name: PR size summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          additions=$(gh pr view ${{ github.event.pull_request.number }} --json additions -q .additions)
          deletions=$(gh pr view ${{ github.event.pull_request.number }} --json deletions -q .deletions)
          files=$(gh pr view ${{ github.event.pull_request.number }} --json changedFiles -q .changedFiles)
          # Bucket for at-a-glance size — thresholds calibrated for this repo.
          total=$((additions + deletions))
          if   [ "$total" -lt 100  ]; then bucket="XS"
          elif [ "$total" -lt 400  ]; then bucket="S"
          elif [ "$total" -lt 1000 ]; then bucket="M"
          elif [ "$total" -lt 2500 ]; then bucket="L"
          else                              bucket="XL"
          fi
          echo "### PR size: $bucket ($total lines across $files files, +$additions / -$deletions)" >> "$GITHUB_STEP_SUMMARY"

      # ─── Headless simulator smoke test ────────────────────────────────────
      # Boots ./gradlew simulateJavaRelease under Xvfb, tails output for 20 s,
      # and fails if the process crashes or an Exception / ERROR line appears.
      # Catches startup regressions (bad YAGSL config, missing deploy files,
      # null-dereferences in RobotContainer) that a normal build doesn't see.
      #
      # continue-on-error at first: the smoke test is new and we want to see
      # it exercise real PRs before making it required. Flip to `false` once
      # we've observed it catch at least one real bug.
      - name: Install Xvfb (virtual display for WPILib Sim GUI)
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Headless sim smoke test (20 s)
        id: sim_smoke
        continue-on-error: true
        timeout-minutes: 3
        run: xvfb-run -a --server-args="-screen 0 1280x800x24" python3 tools/sim_smoke_test.py --duration 20

      - name: Upload sim smoke test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sim-smoke-log
          path: |
            build/*.log
            build/simulation*.log
          retention-days: 7
          if-no-files-found: ignore
